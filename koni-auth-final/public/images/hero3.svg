<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a3a6b"/>
      <stop offset="50%" stop-color="#0a1628"/>
      <stop offset="100%" stop-color="#e74c3c" stop-opacity="0.8"/>
    </linearGradient>
    <radialGradient id="glow1" cx="75%" cy="35%" r="45%">
      <stop offset="0%" stop-color="#e74c3c" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#e74c3c" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="20%" cy="70%" r="35%">
      <stop offset="0%" stop-color="#f4d03f" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#f4d03f" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Base gradient background - BRIGHT -->
  <rect width="1600" height="900" fill="url(#bg)"/>
  
  <!-- Color glows -->
  <rect width="1600" height="900" fill="url(#glow1)"/>
  <rect width="1600" height="900" fill="url(#glow2)"/>

  <!-- Decorative large circles -->
  <circle cx="1250" cy="180" r="320" fill="#e74c3c" fill-opacity="0.12"/>
  <circle cx="1300" cy="150" r="220" fill="#e74c3c" fill-opacity="0.10"/>
  <circle cx="1350" cy="120" r="120" fill="#e74c3c" fill-opacity="0.15"/>
  
  <circle cx="150" cy="750" r="200" fill="#f4d03f" fill-opacity="0.10"/>
  <circle cx="100" cy="800" r="120" fill="#f4d03f" fill-opacity="0.12"/>

  <!-- Grid lines subtle -->
  <line x1="0" y1="300" x2="1600" y2="300" stroke="white" stroke-opacity="0.06" stroke-width="1"/>
  <line x1="0" y1="600" x2="1600" y2="600" stroke="white" stroke-opacity="0.06" stroke-width="1"/>
  <line x1="533" y1="0" x2="533" y2="900" stroke="white" stroke-opacity="0.06" stroke-width="1"/>
  <line x1="1066" y1="0" x2="1066" y2="900" stroke="white" stroke-opacity="0.06" stroke-width="1"/>

  <!-- Diagonal accent lines -->
  <line x1="900" y1="0" x2="1600" y2="500" stroke="#e74c3c" stroke-opacity="0.08" stroke-width="2"/>
  <line x1="950" y1="0" x2="1600" y2="450" stroke="#f4d03f" stroke-opacity="0.06" stroke-width="1"/>
  <line x1="0" y1="400" x2="700" y2="900" stroke="#f4d03f" stroke-opacity="0.06" stroke-width="1"/>

  <!-- Left accent bar -->
  <rect x="0" y="0" width="8" height="900" fill="#e74c3c"/>
  <rect x="8" y="0" width="3" height="900" fill="#f4d03f" fill-opacity="0.5"/>

  <!-- Olympic rings - decorative right side -->
  <circle cx="1100" cy="500" r="45" fill="none" stroke="#0085C7" stroke-width="9" stroke-opacity="0.55"/>
  <circle cx="1180" cy="500" r="45" fill="none" stroke="#F4C300" stroke-width="9" stroke-opacity="0.55"/>
  <circle cx="1260" cy="500" r="45" fill="none" stroke="#EEEEEE" stroke-width="9" stroke-opacity="0.45"/>
  <circle cx="1340" cy="500" r="45" fill="none" stroke="#009F3D" stroke-width="9" stroke-opacity="0.55"/>
  <circle cx="1420" cy="500" r="45" fill="none" stroke="#DF0024" stroke-width="9" stroke-opacity="0.55"/>

  <!-- Stars/dots decorative -->
  <circle cx="400" cy="150" r="3" fill="white" fill-opacity="0.4"/>
  <circle cx="600" cy="80" r="2" fill="white" fill-opacity="0.3"/>
  <circle cx="800" cy="200" r="2.5" fill="white" fill-opacity="0.35"/>
  <circle cx="200" cy="300" r="2" fill="#f4d03f" fill-opacity="0.6"/>
  <circle cx="700" cy="750" r="3" fill="#f4d03f" fill-opacity="0.4"/>
  <circle cx="500" cy="650" r="2" fill="white" fill-opacity="0.3"/>
  <circle cx="900" cy="820" r="2.5" fill="#e74c3c" fill-opacity="0.4"/>

  <!-- Bottom gradient fade for text readability -->
  <defs>
    <linearGradient id="fade" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0a1628" stop-opacity="0.7"/>
      <stop offset="55%" stop-color="#0a1628" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#0a1628" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#fade)"/>
</svg>